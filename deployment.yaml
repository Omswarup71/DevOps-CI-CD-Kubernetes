apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-app

  template:
    metadata:
      labels:
        app: devops-app

    spec:
      containers:
      - name: devops-container
        image: iamomswarupnanda/devopsproject1:latest
        ports:
        - containerPort: 8080